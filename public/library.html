<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamTales | Magical Story Library</title>
    <meta name="description" content="Browse our magical collection of hand-picked tales for your little ones.">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Library-specific styles */
        .library-header {
            padding: 12rem 0 8rem;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .header-bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .header-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1);
            transform: translateX(100%);
        }
        .header-slide.active {
            transform: translateX(0);
            z-index: 2;
        }
        .header-slide.prev {
            transform: translateX(-100%);
            z-index: 1;
        }
        .header-content {
            position: relative;
            z-index: 10;
        }
        .library-header h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: #ff75a0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .library-header p {
            font-size: 1.2rem;
            color: #ff75a0;
            margin-bottom: 2.5rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .search-bar-wrapper {
            max-width: 550px;
            margin: 0 auto;
            position: relative;
        }
        .search-bar-wrapper i {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
        }
        #searchInput {
            width: 100%;
            padding: 1.1rem 1.5rem 1.1rem 3.5rem;
            border-radius: 50px;
            border: none;
            font-family: inherit;
            font-size: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            outline: none;
            transition: var(--transition);
        }
        #searchInput:focus {
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
        }
        .library-controls {
            padding: 2.5rem 0 1rem;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .category-filters {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: none;
        }
        .category-filters::-webkit-scrollbar { display: none; }
        .category-btn {
            background: var(--bg);
            border: 2px solid transparent;
            color: var(--text-muted);
            padding: 0.5rem 1.4rem;
            border-radius: 50px;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }
        .category-btn:hover { border-color: var(--primary-light); color: var(--primary); }
        .category-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .library-body {
            padding: 4rem 0 6rem;
            min-height: 60vh;
        }
        .stories-count {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }
        .loading-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
        .loading-state p { font-size: 1.1rem; }
        .nav-active {
            color: var(--primary) !important;
        }
        .nav-active::after {
            width: 100% !important;
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <!-- Navbar -->
    <nav id="navbar" class="scrolled">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i data-lucide="sparkles"></i>
                DreamTales
            </a>
            <div class="nav-links">
                <div class="user-links" id="userLinks">
                    <span id="navWelcome" style="color: var(--primary); font-weight: 600;"></span>
                    <a href="index.html" onclick="goToDashboard(event)">Dashboard</a>
                    <a href="admin.html" id="adminLink" style="display: none;">Admin</a>
                    <a href="library.html" class="nav-active">Library</a>
                    <a href="settings.html">Settings</a>
                    <button class="btn-login" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Library Header -->
    <div class="library-header animate-up" id="libraryHeader">
        <div class="header-bg-container" id="headerBgContainer">
            <div class="header-slide active" style="background-image: url('/assets/background.jpg');"></div>
            <div class="header-slide" style="background-image: url('/assets/back_image.jpg');"></div>
            <div class="header-slide" style="background-image: url('/assets/library_background.jpg');"></div>
        </div>
        <div class="header-content">
            <h1>✨ Magical Story Library</h1>
            <p>Discover wonderful tales handpicked for your little adventurers</p>
        </div>
    </div>

    <!-- Category Filters & Search -->
    <div class="library-controls">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; gap: 2rem; flex-wrap: wrap;">
            <div class="category-filters" id="categoryFilters">
                <button class="category-btn active" onclick="filterByCategory('All')">All Stories</button>
            </div>
            <div class="search-bar-wrapper" style="margin-top: 0; max-width: 400px; flex: 1;">
                <i data-lucide="search"></i>
                <input type="text" id="searchInput" placeholder="Search by title or author...">
            </div>
        </div>
    </div>

    <!-- Stories Grid -->
    <div class="library-body">
        <div class="container">
            <p class="stories-count" id="storiesCount"></p>
            <div class="stories-grid" id="storiesGrid">
                <div class="loading-state">
                    <p>🌟 Loading magical stories...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Auth Overlay (for edge cases) -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-modal">
            <button class="close-btn" onclick="closeAuth()">
                <i data-lucide="x"></i>
            </button>
            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab" onclick="toggleAuth('login')">Login</div>
                <div class="auth-tab" id="registerTab" onclick="toggleAuth('register')">Register</div>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group"><input type="email" placeholder="Email Address" required></div>
                <div class="form-group"><input type="password" placeholder="Password" required></div>
                <button type="submit" class="btn-primary">Welcome Back!</button>
            </form>
            <form id="registerForm" class="auth-form" style="display:none;">
                <div class="form-group"><input type="text" placeholder="Your Name" required></div>
                <div class="form-group"><input type="email" placeholder="Email Address" required></div>
                <div class="form-group"><input type="password" placeholder="Password" required></div>
                <div class="form-group"><input type="text" placeholder="Child's Name" required></div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Story Reader Modal -->
    <div class="auth-overlay" id="storyOverlay">
        <div class="auth-modal story-modal">
            <button class="close-btn" onclick="closeStory()">
                <i data-lucide="x"></i>
            </button>
            <div class="story-reader-content" id="storyContentArea">
                <div style="margin-bottom: 1.5rem; display: flex; justify-content: flex-end; gap: 1rem;">
                    <button class="btn-primary" id="takeQuizBtn" onclick="startQuiz()" style="display: none; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; font-size: 0.9rem; background: var(--accent);">
                        <i data-lucide="brain"></i>
                        <span>Take Quiz</span>
                    </button>
                    <button class="btn-primary" id="ttsBtn" onclick="toggleTTS()" style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; font-size: 0.9rem;">
                        <i data-lucide="volume-2" style="width: 18px; height: 18px;"></i>
                        <span>Read Aloud</span>
                    </button>
                </div>
                <div id="storyMainView">
                    <h2 id="storyTitle">Story Title</h2>
                    <p class="story-meta" id="storyMeta">By Author | Category</p>
                    <div class="story-body" id="storyBody">
                        Story content goes here...
                    </div>
                </div>
                <div id="quizView" style="display: none;">
                    <h2 id="quizTitle">Story Quiz</h2>
                    <div id="quizContainer">
                        <!-- Questions will be injected here -->
                    </div>
                    <div id="quizResults" style="display: none; text-align: center; margin-top: 2rem;">
                        <h3>Quiz Complete!</h3>
                        <p id="scoreDisplay" style="font-size: 2rem; color: var(--primary); font-weight: 800; margin: 1rem 0;"></p>
                        <button class="btn-primary" onclick="backToStory()">Back to Story</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="library.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
